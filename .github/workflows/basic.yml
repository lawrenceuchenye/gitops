name: Test Worflow

on:
   workflow_dispatch:
      inputs:
         role:
             description: "Role in the company"
             required: true
             type: string

         action:
             description: "What did you do?"
             required: true
             type: string


jobs:
   demo:
     runs-on: ubuntu-latest

     steps:
       - name: Print out input
         run: |
           echo "Role of action issuer:${{github.event.inputs.role}}"

   job_2:
       runs-on: ubuntu-latest
       needs: demo
       steps:
         - name: Print out action
           run: |
             echo "Action: ${{ github.event.inputs.action}}"
         
             
         

   
